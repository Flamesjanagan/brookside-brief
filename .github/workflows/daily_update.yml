name: Daily Macro Update

on:
  schedule:
    - cron: "30 13 * * 1-5"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Sync to latest remote
        run: |
          git fetch origin
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance anthropic pytz

      - name: Run macro update script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_macro.py

      - name: Commit and push updated site
        run: |
          git config user.name  "Brookside Brief Bot"
          git config user.email "bot@brooksidebrief.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Daily macro update: $(date -u '+%Y-%m-%d')"
          git push --force origin main
