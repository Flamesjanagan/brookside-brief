name: Daily Macro Update

on:
  schedule:
    # 8:30 AM Eastern = 13:30 UTC  |  runs Mon–Fri only
    - cron: "30 13 * * 1-5"
  workflow_dispatch:   # lets you trigger manually from the GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance anthropic pytz

      - name: Run macro update script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_macro.py
