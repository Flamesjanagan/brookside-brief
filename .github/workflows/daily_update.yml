name: Daily Macro Update

on:
  schedule:
    # 8:30 AM Eastern = 13:30 UTC  |  runs Mon–Fri only
    - cron: "30 13 * * 1-5"
  workflow_dispatch:   # lets you trigger manually from the GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the updated index.html back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance anthropic pytz

      - name: Run macro update script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/update_macro.py

      - name: Commit and push updated site
        run: |
          git config user.name  "Brookside Brief Bot"
          git config user.email "bot@brooksidebrief.com"
          git add index.html
          # Only commit if something actually changed
          git diff --staged --quiet || git commit -m "Daily macro update: $(date -u '+%Y-%m-%d')"
          # Pull any changes pushed by the user since checkout, then push
          git pull --rebase origin main
          git push
